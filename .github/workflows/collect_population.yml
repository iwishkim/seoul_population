name: 서울 유동인구 수집

on:
  schedule:
    # UTC 기준 30분마다. GitHub Actions는 스케줄을 "최선 노력(best-effort)"으로만
    # 보장하므로 실제 실행 시각은 지연될 수 있음 — 이는 의도된 전제이며,
    # 실제 수집 시각은 collect.py가 그때그때 기록하므로 데이터 정확도에는 문제 없음.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼 제공

permissions:
  contents: write

concurrency:
  # 이전 실행이 아직 끝나지 않았으면 취소하지 않고 대기열에 넣어 순차 실행.
  # git push 충돌 방지 목적.
  group: population-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests pandas

      - name: 데이터 수집 실행
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: python collect.py

      - name: 결과 커밋 및 푸시
        run: |
          git config user.name "population-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seoul_population_log.csv

          if git diff --cached --quiet; then
            echo "변경 사항 없음 (수집 실패 또는 데이터 없음) — 커밋 스킵"
          else
            git commit -m "데이터 수집: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          fi
